set -g @everforest_bg_dim '#293136'
set -g @everforest_bg0 '#333c43'
set -g @everforest_bg1 '#3a464c'
set -g @everforest_bg2 '#434f55'
set -g @everforest_bg3 '#4d5960'
set -g @everforest_bg4 '#555f66'
set -g @everforest_bg5 '#5d6b66'
set -g @everforest_bg_visual '#5c3f4f'
set -g @everforest_bg_red '#59464c'
set -g @everforest_bg_green '#48584e'
set -g @everforest_bg_blue '#3f5865'
set -g @everforest_bg_yellow '#55544a'
set -g @everforest_fg '#d3c6aa'
set -g @everforest_red '#e67e80'
set -g @everforest_orange '#e69875'
set -g @everforest_yellow '#dbbc7f'
set -g @everforest_green '#a7c080'
set -g @everforest_aqua '#83c092'
set -g @everforest_blue '#7fbbb3'
set -g @everforest_purple '#d699b6'
set -g @everforest_grey0 '#7a8478'
set -g @everforest_grey1 '#859289'
set -g @everforest_grey2 '#9da9a0'
set -g @everforest_statusline1 '#a7c080'
set -g @everforest_statusline2 '#d3c6aa'
set -g @everforest_statusline3 '#e67e80'

set -g status on
set -g status-interval 2
set -g status-style "fg=#{@everforest_fg},bg=#{@everforest_bg_dim}"
set -g status-left-style "fg=#{@everforest_fg},bg=#{@everforest_bg_dim}"
set -g status-right-style "fg=#{@everforest_fg},bg=#{@everforest_bg_dim}"
set -g message-style "fg=#{@everforest_statusline3},bg=#{@everforest_bg_dim}"
set -g message-command-style "fg=#{@everforest_bg3},bg=#{@everforest_bg1}"
set -g mode-style "fg=#{@everforest_purple},bg=#{@everforest_bg_red}"
setw -g window-status-style "fg=#{@everforest_grey0},bg=#{@everforest_bg0}"
setw -g window-status-activity-style "bg=#{@everforest_bg1},fg=#{@everforest_bg3}"
setw -g window-status-current-style "fg=#{@everforest_fg},bg=#{@everforest_bg_green}"
set -g pane-border-style "fg=#{@everforest_bg1}"
set -g pane-active-border-style "fg=#{@everforest_blue}"
set -g display-panes-active-colour '#7fbbb3'
set -g display-panes-colour '#e69875'
set -g clock-mode-colour '#7fbbb3'
set -g window-status-bell-style "fg=#{@everforest_bg0},bg=#{@everforest_statusline3}"

set -g status-left-length 60
set -g status-right-length 150
set -g status-left "#[fg=#{@everforest_bg_dim},bg=#{@everforest_green},bold] #S #[fg=#{@everforest_green},bg=#{@everforest_bg2},nobold] | #[fg=#{@everforest_green},bg=#{@everforest_bg2},bold] #(whoami) "
set -g status-right "#[fg=#{@everforest_fg},bg=#{@everforest_bg2}] %Y-%m-%d %H:%M #[fg=#{@everforest_aqua},bg=#{@everforest_bg2},bold] | #[fg=#{@everforest_bg_dim},bg=#{@everforest_aqua},bold] #h "
set -g window-status-separator " "
set -g window-status-format "#[fg=#{@everforest_grey0},bg=#{@everforest_bg0}] #I:#W "
set -g window-status-current-format "#[fg=#{@everforest_bg0},bg=#{@everforest_bg_green},bold] #I:#W "
