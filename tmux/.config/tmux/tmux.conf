# change the prefix from 'C-b' to 'C-a'
# (remap capslock to CTRL for easy access)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# start with window 1 (instead of 0)
set -g base-index 1

# start with pane 1
set -g pane-base-index 1

# split panes using | and -, make sure they open in the same path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

unbind '"'
unbind %

# open new windows in the current path
bind c new-window -c "#{pane_current_path}"

# reload config file
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded tmux config"

unbind p
bind p previous-window

# shorten command delay
set -sg escape-time 1

# don't rename windows automatically
set -g allow-rename off

# mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Use Ctrl-h/j/k/l without prefix key to switch panes
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# enable vi mode keys
set-window-option -g mode-keys vi

# set default terminal mode to 256 colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# allow focus events to get through to applications running in tmux
set -g focus-events on


# Design Tweaks
# -------------

# loud or quiet?
set -g visual-activity on
set -g visual-bell on
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# palette
tmux_bg="#101010"
tmux_surface="#2a2a2a"
tmux_overlay="#555555"
tmux_text="#eeeeee"
tmux_muted="#a8a8a8"
tmux_accent="#d0d0d0"
tmux_alert="#ffffff"

# modes
setw -g clock-mode-colour "$tmux_accent"
setw -g mode-style "fg=$tmux_bg,bg=$tmux_accent,bold"

# panes
set -g pane-border-style "fg=$tmux_surface"
set -g pane-active-border-style "fg=$tmux_accent"
set -g display-panes-colour "$tmux_overlay"
set -g display-panes-active-colour "$tmux_text"

# statusbar
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "fg=$tmux_text,bg=$tmux_bg"
set -g status-left-length 40
set -g status-right-length 100

set -g status-left "#{?client_prefix,#[fg=$tmux_bg bg=$tmux_text bold],#[fg=$tmux_bg bg=$tmux_accent bold]} #S #[fg=#{?client_prefix,$tmux_text,$tmux_accent} bg=$tmux_bg] "

set -g status-right "#[fg=$tmux_overlay bg=$tmux_bg]#(whoami)@#H #[fg=$tmux_surface]#[fg=$tmux_muted bg=$tmux_surface] %Y-%m-%d #[fg=$tmux_accent] #[fg=$tmux_text]%H:%M "
set -g status-right-style "fg=$tmux_text,bg=$tmux_bg"

setw -g window-status-separator ""
setw -g window-status-style "fg=$tmux_muted,bg=$tmux_bg"
setw -g window-status-format " #[fg=$tmux_muted]#I:#W#{?window_flags,#[fg=$tmux_text] #F,} "

setw -g window-status-current-style "fg=$tmux_text,bg=$tmux_bg,bold"
setw -g window-status-current-format " #[fg=$tmux_text,nounderscore]• #[fg=$tmux_text,underscore,bold]#I:#W#{?window_flags, #F,} "

setw -g window-status-activity-style "fg=$tmux_text,bg=$tmux_bg"
setw -g window-status-bell-style "fg=$tmux_bg,bg=$tmux_alert,bold"

# messages
set -g message-style "fg=$tmux_text,bg=$tmux_surface"
set -g message-command-style "fg=$tmux_bg,bg=$tmux_accent"
