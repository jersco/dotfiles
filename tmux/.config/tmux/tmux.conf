# change the prefix from 'C-b' to 'C-a'
# (remap capslock to CTRL for easy access)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# start with window 1 (instead of 0)
set -g base-index 1

# start with pane 1
set -g pane-base-index 1

# split panes using | and -, make sure they open in the same path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

unbind '"'
unbind %

# open new windows in the current path
bind c new-window -c "#{pane_current_path}"

# reload config file
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded tmux config"

unbind p
bind p previous-window

# shorten command delay
set -sg escape-time 1

# don't rename windows automatically
set -g allow-rename off

# mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Use Ctrl-h/j/k/l without prefix key to switch panes
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Resize panes with prefix + H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# enable vi mode keys
set-window-option -g mode-keys vi

# set default terminal mode to 256 colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# allow focus events to get through to applications running in tmux
set -g focus-events on


# Design Tweaks
# -------------

# loud or quiet?
set -g visual-activity on
set -g visual-bell on
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# rose-pine theme
set -g @rose_pine_variant "main"
set -g @rose_pine_host "on"
set -g @rose_pine_date_time "%Y-%m-%d %H:%M"
set -g @rose_pine_window_status_separator ""
set -g @rose_pine_left_separator ":"
set -g @rose_pine_default_window_behavior "off"

run-shell ~/.config/tmux/plugins/rose-pine/rose-pine.tmux

# Minimal tab format on top of rose-pine.
set -g status-left ""
set -g status-left-length 0
setw -g window-status-separator ""
setw -g window-status-style "fg=#908caa,bg=#191724"
setw -g window-status-format " #[fg=#908caa]#I:#W#{?window_flags,#[fg=#e0def4] #F,} "
setw -g window-status-current-style "fg=#e0def4,bg=#191724,bold"
setw -g window-status-current-format " #[fg=#f6c177,nounderscore]• #[fg=#f6c177,underscore,bold]#I:#W#{?window_flags, #F,} "
